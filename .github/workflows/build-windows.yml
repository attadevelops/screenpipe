name: Build Screenpipe Windows CLI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          Invoke-WebRequest https://static.rust-lang.org/rustup/dist/x86_64-pc-windows-gnu/rustup-init.exe -OutFile rustup-init.exe
          .\rustup-init.exe -y

      - name: Install 7zip
        shell: powershell
        run: |
          $7zipUrl = "https://7-zip.org/a/7z2301-x64.exe"
          Invoke-WebRequest -Uri $7zipUrl -OutFile 7z-installer.exe
          Start-Process -FilePath .\7z-installer.exe -Args "/S" -Wait
          echo "C:\Program Files\7-Zip" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Download ONNX Runtime
        shell: pwsh
        run: |
          $url = "https://github.com/microsoft/onnxruntime/releases/download/v1.19.2/onnxruntime-win-x64-1.19.2.zip"
          Invoke-WebRequest -Uri $url -OutFile onnxruntime.zip
          7z x onnxruntime.zip -o"apps/screenpipe-app-tauri/src-tauri/" -y
          Get-ChildItem "apps/screenpipe-app-tauri/src-tauri/onnxruntime-win-x64-1.19.2/lib" | ForEach-Object { Write-Host $_.Name }

      - name: Build CLI
        env:
          CARGO_PROFILE_RELEASE_STRIP: "none"
          CARGO_PROFILE_RELEASE_PANIC: "abort"
          CARGO_PROFILE_RELEASE_INCREMENTAL: "false"
          RUSTFLAGS: "-C link-arg=/LTCG"
          ORT_STRATEGY: system
          ORT_LIB_LOCATION: ${{ github.workspace }}/apps/screenpipe-app-tauri/src-tauri/onnxruntime-win-x64-1.19.2
          AWS_LC_SYS_PREBUILT_NASM: "1"
        run: |
          cargo build --release --target x86_64-pc-windows-msvc

      - name: Package artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Copy-Item target/x86_64-pc-windows-msvc/release/screenpipe.exe artifacts/
          Copy-Item apps/screenpipe-app-tauri/src-tauri/onnxruntime-win-x64-1.19.2/lib/*.dll artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: screenpipe-windows
          path: artifacts/
          retention-days: 30
